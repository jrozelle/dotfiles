"$schema" = 'https://starship.rs/config-schema.json'

# Starship prompt — Hybrid: simple text + Nerd Font icons + Catppuccin Mocha colors

command_timeout = 1000
scan_timeout    = 100
add_newline     = true

format = """
$os\
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$rust\
$golang\
$c\
$kotlin\
$java\
$haskell\
$php\
$docker_context\
$cmd_duration\
$line_break\
$character"""

right_format = "$time"

# ─── OS Icon ─────────────────────────────────────────────────────────────────

[os]
disabled = false
style    = "bold #ffffff"
format   = "[$symbol]($style) "

[os.symbols]
Macos   = "󰀵"
Linux   = "󰌽"
Ubuntu  = "󰕈"
Debian  = "󰣚"
Fedora  = "󰣛"
Arch    = "󰣇"
Windows = "󰍲"
Unknown = "󰈺"

# ─── Username (SSH / root) ───────────────────────────────────────────────────

[username]
show_always = false
style_user  = "bold #f9e2af"
style_root  = "bold #f38ba8"
format      = "[$user]($style)"

# ─── Hostname (SSH) ──────────────────────────────────────────────────────────

[hostname]
ssh_only = true
style    = "bold #fab387"
format   = "[@$hostname]($style) "

# ─── Directory ───────────────────────────────────────────────────────────────

[directory]
style              = "bold #89b4fa"
format             = "[$path]($style)[$read_only]($read_only_style) "
truncation_length  = 3
truncation_symbol  = "…/"
truncate_to_repo   = true
read_only          = " 󰌾"
read_only_style    = "bold #f38ba8"

[directory.substitutions]
"Documents" = "󰈙 Docs"
"Downloads" = "󰁂 Downloads"
"Music"     = "󰝚 Music"
"Pictures"  = "󰋯 Pictures"
"Developer" = "󰲋 Dev"

# ─── Git ─────────────────────────────────────────────────────────────────────

[git_branch]
symbol = " "
style  = "bold #cba6f7"
format = "on [$symbol$branch(:$remote_branch)]($style) "

[git_status]
style      = "#f38ba8"
format     = '([$all_status$ahead_behind]($style) )'
conflicted = "="
untracked  = "?"
stashed    = "\\$"
modified   = "!"
staged     = "[+](#a6e3a1)"
renamed    = "»"
deleted    = "✘"
ahead      = "⇡${count}"
behind     = "⇣${count}"
diverged   = "⇕⇡${ahead_count}⇣${behind_count}"

# ─── Languages ───────────────────────────────────────────────────────────────

[python]
symbol = " "
style  = "bold #f9e2af"
format = '[$symbol($version )(\($virtualenv\) )]($style)'

[nodejs]
symbol = " "
style  = "bold #a6e3a1"
format = "[$symbol($version )]($style)"

[rust]
symbol = " "
style  = "bold #fab387"
format = "[$symbol($version )]($style)"

[golang]
symbol = " "
style  = "bold #94e2d5"
format = "[$symbol($version )]($style)"

[c]
symbol = " "
style  = "bold #89b4fa"
format = "[$symbol($version )]($style)"

[java]
symbol = " "
style  = "bold #f38ba8"
format = "[$symbol($version )]($style)"

[kotlin]
symbol = " "
style  = "bold #cba6f7"
format = "[$symbol($version )]($style)"

[haskell]
symbol = " "
style  = "bold #cba6f7"
format = "[$symbol($version )]($style)"

[php]
symbol = " "
style  = "bold #89b4fa"
format = "[$symbol($version )]($style)"

# ─── Docker ──────────────────────────────────────────────────────────────────

[docker_context]
symbol        = " "
style         = "bold #74c7ec"
only_with_files = true
format        = "[$symbol$context]($style) "

# ─── Duration ────────────────────────────────────────────────────────────────

[cmd_duration]
min_time = 2000
style    = "#f9e2af"
format   = "[$duration]($style) "

# ─── Time ────────────────────────────────────────────────────────────────────

[time]
disabled    = false
time_format = "%R"
style       = "#6c7086"
format      = "[$time]($style)"

# ─── Prompt character ────────────────────────────────────────────────────────

[line_break]
disabled = false

[character]
disabled                  = false
success_symbol            = "[❯](bold #a6e3a1)"
error_symbol              = "[❯](bold #f38ba8)"
vimcmd_symbol             = "[❮](bold #cba6f7)"
vimcmd_replace_one_symbol = "[❮](bold #cba6f7)"
vimcmd_replace_symbol     = "[❮](bold #cba6f7)"
vimcmd_visual_symbol      = "[❮](bold #f9e2af)"
