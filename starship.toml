# Starship prompt config
# Palette: Catppuccin Mocha
# Docs: https://starship.rs/config/

# Timeout for commands (ms)
command_timeout = 1000

# Scan timeout for directory detection (ms) - default 30, increase for large dirs
scan_timeout = 100

# Newline before prompt
add_newline = true

# Prompt format
format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$docker_context\
$cmd_duration\
$line_break\
$character"""

right_format = "$time"

[time]
disabled = false
time_format = "%H:%M"
style = "#6c7086"

[username]
show_always = false
style_user = "bold #f9e2af"
format = "[$user]($style)"

[hostname]
ssh_only = true
style = "bold #fab387"
format = "[@$hostname]($style) "

[directory]
truncation_length = 4
truncate_to_repo = true
style = "bold #89b4fa"

[git_branch]
symbol = " "
style = "bold #cba6f7"

[git_status]
style = "#f38ba8"
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?"
stashed = "\\$"
modified = "!"
staged = "[+](#a6e3a1)"
renamed = "»"
deleted = "✘"

[docker_context]
symbol = " "
style = "bold #74c7ec"
only_with_files = true

[cmd_duration]
min_time = 2000
style = "#f9e2af"
format = "[$duration]($style) "

[character]
success_symbol = "[❯](#a6e3a1)"
error_symbol = "[❯](#f38ba8)"
