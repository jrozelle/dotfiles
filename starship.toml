"$schema" = 'https://starship.rs/config-schema.json'

# Starship prompt config
# Preset: Tokyo Night (official)
# Docs: https://starship.rs/presets/tokyo-night

command_timeout = 1000
scan_timeout = 100
add_newline = true

format = """
[░▒▓](#a3aed2)\
[  ](bg:#a3aed2 fg:#090c0c)\
[](bg:#769ff0 fg:#a3aed2)\
$directory\
[](fg:#769ff0 bg:#394260)\
$git_branch\
$git_status\
[](fg:#394260 bg:#212736)\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[](fg:#212736 bg:#1d2230)\
$docker_context\
$conda\
$time\
[ ](fg:#1d2230)\
$cmd_duration\
\n$character"""

# ─── Directory ───────────────────────────────────────────────────────────────

[directory]
style = "fg:#e3e5e5 bg:#769ff0"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"
truncate_to_repo = true

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads"  = " "
"Music"      = "󰝚 "
"Pictures"   = " "
"Developer"  = "󰲋 "

# ─── Git ─────────────────────────────────────────────────────────────────────

[git_branch]
symbol = ""
style = "bg:#394260"
format = '[[ $symbol $branch ](fg:#769ff0 bg:#394260)]($style)'

[git_status]
style = "bg:#394260"
format = '[[($all_status$ahead_behind )](fg:#769ff0 bg:#394260)]($style)'

# ─── Languages ───────────────────────────────────────────────────────────────

[nodejs]
symbol = ""
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[c]
symbol = " "
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[rust]
symbol = ""
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[golang]
symbol = ""
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[php]
symbol = ""
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[java]
symbol = " "
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[kotlin]
symbol = ""
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[haskell]
symbol = ""
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[python]
symbol = ""
style = "bg:#212736"
format = '[[ $symbol ($version)(\(#$virtualenv\)) ](fg:#769ff0 bg:#212736)]($style)'

# ─── Docker ──────────────────────────────────────────────────────────────────

[docker_context]
symbol = ""
style = "bg:#1d2230"
only_with_files = true
format = '[[ $symbol $context ](fg:#a0a9cb bg:#1d2230)]($style)'

[conda]
symbol = "  "
style = "fg:#a0a9cb bg:#1d2230"
format = '[$symbol$environment ]($style)'
ignore_base = false

# ─── Time ────────────────────────────────────────────────────────────────────

[time]
disabled = false
time_format = "%R"
style = "bg:#1d2230"
format = '[[  $time ](fg:#a0a9cb bg:#1d2230)]($style)'

# ─── Duration ────────────────────────────────────────────────────────────────

[cmd_duration]
min_time = 2000
format = " in $duration "
disabled = false

# ─── Hostname (SSH) ───────────────────────────────────────────────────────────

[hostname]
ssh_only = true
style = "bg:#a3aed2 fg:#090c0c bold"
format = '[@$hostname ]($style)'

# ─── Cursor ──────────────────────────────────────────────────────────────────

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[❯](bold fg:#769ff0)'
error_symbol   = '[❯](bold fg:#f7768e)'
vimcmd_symbol  = '[❮](bold fg:#769ff0)'
vimcmd_replace_one_symbol = '[❮](bold fg:#bb9af7)'
vimcmd_replace_symbol     = '[❮](bold fg:#bb9af7)'
vimcmd_visual_symbol      = '[❮](bold fg:#e0af68)'
