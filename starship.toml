# Starship prompt config
# Palette: Catppuccin Mocha
# Style: Powerline / Tokyo Night inspired
# Docs: https://starship.rs/config/

command_timeout = 1000
scan_timeout = 100
add_newline = true

format = """
[](fg:#45475a)\
$os\
$directory\
$git_branch\
$git_status\
$docker_context\
$cmd_duration\
$line_break\
$character"""

right_format = "$time"

# ─── Time ────────────────────────────────────────────────────────────────────

[time]
disabled = false
time_format = "%H:%M"
style = "#6c7086"
format = "[$time]($style)"

# ─── OS icon ─────────────────────────────────────────────────────────────────

[os]
disabled = false
style = "bg:#45475a fg:#cdd6f4 bold"
format = "[$symbol ]($style)"

[os.symbols]
Macos   = "󰀵"
Linux   = "󰌽"
Ubuntu  = "󰕈"
Debian  = "󰣚"
Fedora  = "󰣛"
Arch    = "󰣇"
Windows = "󰍲"
Unknown = "󰈺"

# ─── Directory ───────────────────────────────────────────────────────────────

[directory]
truncation_length = 4
truncate_to_repo = true
read_only = " 󰌾"
style = "bg:#45475a fg:#89b4fa bold"
format = "[ $path$read_only ]($style)"

# ─── Git ─────────────────────────────────────────────────────────────────────

[git_branch]
symbol = " "
style = "bg:#313244 fg:#cba6f7 bold"
format = "[](bg:#313244 fg:#45475a)[ $symbol$branch ]($style)"

[git_status]
style = "bg:#313244 fg:#f38ba8"
conflicted  = "="
ahead       = "⇡${count}"
behind      = "⇣${count}"
diverged    = "⇕⇡${ahead_count}⇣${behind_count}"
untracked   = "?"
stashed     = "\\$"
modified    = "!"
staged      = "[+](#a6e3a1)"
renamed     = "»"
deleted     = "✘"
format = "[$all_status$ahead_behind]($style)[](fg:#313244) "

# ─── Docker ──────────────────────────────────────────────────────────────────

[docker_context]
symbol = " "
style = "bg:#181825 fg:#89dceb bold"
only_with_files = true
format = " [](fg:#181825)[ $symbol$context ]($style)[](fg:#181825)"

# ─── Command duration ────────────────────────────────────────────────────────

[cmd_duration]
min_time = 2000
style = "bg:#11111b fg:#f9e2af bold"
format = " [](fg:#11111b)[  $duration ]($style)[](fg:#11111b)"

# ─── Cursor ──────────────────────────────────────────────────────────────────

[character]
success_symbol = "[❯](#a6e3a1)"
error_symbol   = "[❯](#f38ba8)"

# ─── SSH ─────────────────────────────────────────────────────────────────────

[username]
show_always = false
style_user = "bold #f9e2af"
format = "[$user]($style)"

[hostname]
ssh_only = true
style = "bold #fab387"
format = "[@$hostname]($style) "
