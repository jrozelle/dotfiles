# ====================
# tmux configuration
# ====================

# --- Souris & scroll ---
set -g mouse on                    # scroll natif, clic pour sélectionner pane/fenêtre

# Fix scroll souris :
# - Si un programme capte déjà la souris (vim, fzf...) : transmettre l'événement
# - Sinon, si on est déjà en mode copie : continuer le scroll
# - Sinon : entrer en mode copie ET scroller immédiatement (sans attendre un 2e scroll)
bind -n WheelUpPane \
  if-shell -F -t= '#{mouse_any_flag}' \
    'send-keys -M' \
    'if -Ft= "#{pane_in_mode}" "send-keys -M" "select-pane -t=; copy-mode -e; send-keys -M"'
bind -n WheelDownPane \
  if-shell -F -t= '#{pane_in_mode}' \
    'send-keys -M' \
    'send-keys -M'

# --- Couleurs & terminal ---
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm*:Tc"            # true color (couvre iTerm2 + autres)

# --- Comportement général ---
set -sg escape-time 10             # réduit le délai ESC (important pour nvim)
set -g history-limit 50000         # taille du scrollback buffer
set -g base-index 1                # fenêtres numérotées à partir de 1
setw -g pane-base-index 1          # panes numérotés à partir de 1
set -g renumber-windows on         # renuméroter si une fenêtre est fermée
set -g focus-events on             # propager les événements focus (nvim autoread)

# --- Copie (mode vi) ---
setw -g mode-keys vi
bind-key -T copy-mode-vi v   send-keys -X begin-selection
bind-key -T copy-mode-vi y   send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle

# --- Raccourcis ---
bind r source-file ~/.tmux.conf \; display "~/.tmux.conf rechargé"

# Splits plus intuitifs (| et -)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Navigation panes avec Alt+flèches (sans préfixe)
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# --- Status bar ---
set -g status-position bottom
set -g status-interval 5
set -g status-left-length 30
set -g status-right-length 60
set -g status-left  "#[fg=colour2,bold]#S #[default]"
set -g status-right "#[fg=colour3]%H:%M  #[fg=colour6]%d %b"
